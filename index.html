<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <title>Vector Interpolation Editor</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            gap: 16px;
            padding: 12px;
        }

        canvas {
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .panel {
            width: 260px;
        }

        .panel input {
            width: 100%;
            margin-bottom: 8px;
        }

        label {
            font-size: 12px;
        }

        /* popup */
        #popup {
            position: absolute;
            background: white;
            border: 1px solid #aaa;
            padding: 10px;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="panel">
        <h3>控制參數</h3>

        <label>點數 n</label>
        <input id="n" type="number" value="20" oninput="resetAll()" />

        <label>P0.x</label>
        <input id="x0" type="number" value="100" oninput="draw()" />

        <label>P0.y</label>
        <input id="y0" type="number" value="100" oninput="draw()" />

        <label>Pn-1.x</label>
        <input id="x1" type="number" value="600" oninput="draw()" />

        <label>Pn-1.y</label>
        <input id="y1" type="number" value="150" oninput="draw()" />

        <hr />

        <p>👉 點擊 Qi 編輯</p>
    </div>

    <canvas id="cv" width="700" height="450"></canvas>

    <div id="popup">
        <div>
            <label>Length</label>
            <input id="pl" type="number" />
        </div>
        <div>
            <label>Angle (deg)</label>
            <input id="pa" type="number" />
        </div>

        <button onclick="applyEdit()">Apply</button>
        <button onclick="closePopup()">Cancel</button>
    </div>

    <script>
        const cv = document.getElementById("cv");
        const ctx = cv.getContext("2d");
        const popup = document.getElementById("popup");

        let V = [];
        let selected = -1;

        function lerp(a, b, t) { return a + (b - a) * t; }
        function quad(l0, l1, t) { return l0 - ((l0 - l1) * t * t); }

        function resetAll() {
            selected = -1;
            buildAll();
            draw();
        }

        function buildAll() {
            const n = +document.getElementById("n").value;

            const P0 = { x: +x0.value, y: +y0.value };
            const P1 = { x: +x1.value, y: +y1.value };

            const V0 = { l: 120, a: 45 * Math.PI / 180 };
            const V1 = { l: 30, a: 20 * Math.PI / 180 };

            V = [];

            for (let i = 0; i < n; i++) {
                const t = i / (n - 1);

                V.push({
                    l: quad(V0.l, V1.l, t),
                    a: lerp(V0.a, V1.a, t)
                });
            }
        }

        function rebuildFrom(k) {
            const n = V.length - k;
            const V1 = V[V.length - 1];
            for (let i = 0; i < n; i++) {
                const t = i / ((n - 1) + 10e-6);
                V[k + i].l = quad(V[k].l, V1.l, t);
                V[k + i].a = lerp(V[k].a, V1.a, t);
            }
        }

        function draw() {
            const n = V.length;

            const P0 = { x: +x0.value, y: +y0.value };
            const P1 = { x: +x1.value, y: +y1.value };

            ctx.clearRect(0, 0, cv.width, cv.height);

            ctx.strokeStyle = "#aaa";
            ctx.beginPath();
            ctx.moveTo(P0.x, P0.y);
            ctx.lineTo(P1.x, P1.y);
            ctx.stroke();

            for (let i = 0; i < n; i++) {
                const t = i / (n - 1);

                const P = {
                    x: lerp(P0.x, P1.x, t),
                    y: lerp(P0.y, P1.y, t)
                };

                const Vi = V[i];

                const Q = {
                    x: P.x + Math.cos(Vi.a) * Vi.l,
                    y: P.y + Math.sin(Vi.a) * Vi.l
                };

                // highlight
                ctx.strokeStyle = (i === selected) ? "orange" : "blue";
                ctx.lineWidth = (i === selected) ? 3 : 1;

                ctx.beginPath();
                ctx.moveTo(P.x, P.y);
                ctx.lineTo(Q.x, Q.y);
                ctx.stroke();

                ctx.fillStyle = "green";
                ctx.beginPath();
                ctx.arc(P.x, P.y, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = (i === selected) ? "orange" : "red";
                ctx.beginPath();
                ctx.arc(Q.x, Q.y, 4, 0, Math.PI * 2);
                ctx.fill();

                V[i]._Q = Q;
            }
        }

        /* ---------------- popup control ---------------- */

        function openPopup(i, x, y) {
            popup.style.left = x + "px";
            popup.style.top = y + "px";
            popup.style.display = "block";

            pl.value = V[i].l;
            pa.value = V[i].a * 180 / Math.PI;
        }

        function closePopup() {
            popup.style.display = "none";
            selected = -1;
            draw();
        }

        function applyEdit() {
            if (selected < 0) return;

            const i = selected;

            V[i].l = +pl.value;
            V[i].a = +pa.value * Math.PI / 180;

            rebuildFrom(i);
            draw();

            closePopup();
        }

        /* ---------------- interaction ---------------- */

        cv.addEventListener("click", (e) => {
            const rect = cv.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let best = -1;
            let bestD = 1e9;

            for (let i = 0; i < V.length; i++) {
                const q = V[i]._Q;
                const d = (q.x - mx) ** 2 + (q.y - my) ** 2;

                if (d < bestD && d < 120) {
                    bestD = d;
                    best = i;
                }
            }

            if (best >= 0) {
                selected = best;
                openPopup(best, e.clientX, e.clientY);
            } else {
                closePopup();
            }

            draw();
        });

        /* 點 popup 外關閉 */
        document.addEventListener("click", (e) => {
            if (popup.style.display === "none") return;

            const isPopup = popup.contains(e.target);
            const isCanvas = e.target === cv;

            if (!isPopup && !isCanvas) {
                closePopup();
            }
        });

        /* init */
        buildAll();
        draw();
    </script>

</body>

</html>
